<!DOCTYPE html>
<html>
<head>
  <script src="main.js"></script> 
  <link rel="stylesheet" href="style.css">   
</head>
<body>

  <sp-heading size="M">Lasso Fill</sp-heading>

  <sp-divider></sp-divider>

  <!-- Toggle -->
  <sp-checkbox id="enabled" checked>Enable</sp-checkbox>

  <!-- Opacity -->
  <div style="display: flex; flex-direction: column;">
    <div style="display: flex; align-items: center; justify-content: space-between;">
      <sp-field-label style="font-size: 12px;" for="opacity">Opacity</sp-field-label>

      <sp-textfield
        id="opacityInput"
        type="number"
        min="0"
        max="100"
        value="100"
        style="width: 60px;"
      ></sp-textfield>
    </div>

    <sp-slider
      id="opacitySlider"
      min="0"
      max="100"
      value="100"
      style="flex: 1;"
    ></sp-slider>
  </div>
